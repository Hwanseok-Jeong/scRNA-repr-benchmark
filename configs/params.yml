# Nextflow Pipeline Parameters for scRNA-seq Representation Benchmark

preprocessing:
  dataset_url: "https://cf.10xgenomics.com/samples/cell-exp/3.0.0/pbmc_1k_v3/pbmc_1k_v3_filtered_feature_bc_matrix.h5" # This will be replaced by script internal tasic downloader, but kept for future extension
  n_hvg: 3000
  target_sum: 1000000  # For CPM
  log_transform: true

latent_models:
  latent_dim: 50       # Compare PCA vs Deep Learning on exact same dimensions
  ae:
    epochs: 200
    batch_size: 128
    learning_rate: 0.001
  vae:
    epochs: 200
    batch_size: 128
    learning_rate: 0.001
  scvi:
    epochs: 200
    batch_size: 128
    learning_rate: 0.001

embed_tsne:
  initialization: "pca"
  perplexity: "N/100"      # Dynamic resolution based on cell count (Kobak & Berens 2019)
  learning_rate: "N/12"
  early_exaggeration: 12
  late_exaggeration: false # Can be turned on to increase cluster tightness

embed_umap:
  n_neighbors: 30          # Usually scales slightly with data, but 30 is good default
  min_dist: 0.3
